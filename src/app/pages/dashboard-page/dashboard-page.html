<h2 nz-typography>Dashboard</h2>
<nz-divider></nz-divider>
<!-- Dashboard Cards -->
<div nz-flex nzJustify="flex-start" nzGap="large">

<app-dasboard-card-component [cardTitle]="'Open Reports'">
  <div body>
    <span class="bg-red bold-text">12</span>
  </div>
</app-dasboard-card-component>
<app-dasboard-card-component [cardTitle]="'Overdue Reports'">
  <div body>
    <span class="bg-yellow bold-text">12</span>
  </div>
</app-dasboard-card-component>
<app-dasboard-card-component [cardTitle]="'Total hardware'">
  <div body>
    <span class="bg-blue bold-text">12</span>
  </div>
</app-dasboard-card-component>
<app-dasboard-card-component [cardTitle]="'Active Clients'">
  <div body>
    <span class="bg-green bold-text">12</span>
  </div>
</app-dasboard-card-component>
</div>

<nz-divider></nz-divider>

<div nz-flex nzJustify="flex-start" nzGap="large" nzWrap="wrap">
  <!-- Table Recent Active Reports -->
  <app-dasboard-box-component [boxTitle]="'Recent Active Reports'">
  <div body>
    <nz-table #dashboardTable [nzShowPagination]="false" nzSize="default" [nzData]="listOfData" [nzScroll]="{ x: 'max-content' }" >
      <colgroup>
        <col style="width: 50px" />
        <col style="width: 200px" />
        <col style="width: 100px" />
        <col style="width: 140px" />
        <col style="width: 120px" />
      </colgroup>
      <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Priority</th>
        <th>Due Date</th>
        <th>Status</th>
      </tr>
      </thead>
      <tbody>
        @for (report of dashboardTable.data; track report){
          <tr>
            <td>{{report.id}}</td>
            <td>{{report.title}}</td>
            <td><nz-tag [nzColor]="priorityColorTag(report.priority)">{{report.priority}}</nz-tag></td>
            <td>{{report.dueDate}}</td>
            <td><nz-tag [nzColor]="statusColorTag(report.status)">{{report.status}}</nz-tag></td>
          </tr>
        }
      </tbody>
    </nz-table>
  </div>
  </app-dasboard-box-component>
  <!-- Quick Access -->
  <app-dasboard-box-component [boxTitle]="'Quick Access'">
  <div body>
    <div nz-row [nzGutter]="[16, 16]">
      <div nz-col nzSpan="12">
        <app-dasboard-card-component [cardTitle]="'Client 1'">
          <div body>
            <button nz-button nzType="primary" > View Branches <nz-icon nzType="right" /></button>
          </div>
        </app-dasboard-card-component>
      </div>
      <div nz-col nzSpan="12">
        <app-dasboard-card-component [cardTitle]="'Client 2'">
          <div body>
            <button nz-button nzType="primary" > View Branches <nz-icon nzType="right" /></button>
          </div>
        </app-dasboard-card-component>
      </div>
    </div>
    <div nz-row [nzGutter]="[16, 16]">
      <div nz-col nzSpan="12">
        <app-dasboard-card-component [cardTitle]="'Client 3'">
          <div body>
            <button nz-button nzType="primary" > View Branches <nz-icon nzType="right" /></button>
          </div>
        </app-dasboard-card-component>
      </div>
      <div nz-col nzSpan="12">
        <app-dasboard-card-component [cardTitle]="'Client 4'">
          <div body>
            <button nz-button nzType="primary" > View Branches <nz-icon nzType="right" /></button>
          </div>
        </app-dasboard-card-component>
      </div>
    </div>
  </div>
  </app-dasboard-box-component>
  <!-- Hardware Overview -->
  <app-dasboard-box-component [boxTitle]="'Hardware Overview'">
    <div body>
      <div nz-row nzGutter="16">
        <div nz-col nzSpan="8">
          <app-dasboard-grey-card-component>
            <div body nz-flex nzGap="middle" class="hwMetric" nzAlign="flex-start">
              <nz-icon nzType="video-camera" nzTheme="fill"></nz-icon>
              <div nz-flex nzVertical nzGap="middle">
                <span>Cameras</span>
                <span class="bg-green bold-text">12</span>
              </div>
            </div>
          </app-dasboard-grey-card-component>
        </div>
        <div nz-col nzSpan="8">
          <app-dasboard-grey-card-component>
            <div body nz-flex nzGap="middle" class="hwMetric" nzAlign="flex-start">
              <nz-icon nzType="video-camera" nzTheme="fill"></nz-icon>
              <div nz-flex nzVertical nzGap="middle">
                <span>Switches</span>
                <span class="bg-green bold-text">12</span>
              </div>
            </div>
          </app-dasboard-grey-card-component>
        </div>
        <div nz-col nzSpan="8">
          <app-dasboard-grey-card-component>
            <div body nz-flex nzGap="middle" class="hwMetric" nzAlign="flex-start">
              <nz-icon nzType="video-camera" nzTheme="fill"></nz-icon>
              <div nz-flex nzVertical nzGap="middle">
                <span>Other Devices</span>
                <span class="bg-green bold-text">12</span>
              </div>
            </div>
          </app-dasboard-grey-card-component>
        </div>
      </div>

    </div>
  </app-dasboard-box-component>
</div>
